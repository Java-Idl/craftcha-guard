<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Craftcha Guard</title>

  <!-- Performance: Preconnect to asset domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://assets.mcasset.cloud" />

  <!-- Performance: Preload Critical Font -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=VT323&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'pixel': ['"VT323"', 'monospace'],
          },
          colors: {
            'mc-bg': '#1d1d1d',
            'mc-gui': '#c6c6c6',
            'mc-slot': '#8b8b8b',
            'mc-text': '#404040',
            'mc-green': '#55ff55',
          },
          boxShadow: {
            'mc-btn': 'inset 2px 2px 0px 0px #ffffff, inset -2px -2px 0px 0px #555555, 2px 2px 0px 0px #000000',
            'mc-btn-hover': 'inset 2px 2px 0px 0px #eaeff2, inset -2px -2px 0px 0px #5e5e6e, 2px 2px 0px 0px #000000',
            'mc-btn-active': 'inset 2px 2px 0px 0px #555555, inset -2px -2px 0px 0px #ffffff, 2px 2px 0px 0px #000000',
            'mc-panel': 'inset 2px 2px 0px 0px #ffffff, inset -2px -2px 0px 0px #555555, 2px 2px 0px 0px #000000',
            'mc-slot': 'inset 2px 2px 0px 0px #373737, inset -2px -2px 0px 0px #ffffff',
          },
          textShadow: {
            'mc': '2px 2px 0px #3f3f3f',
          },
          cursor: {
            'none': 'none',
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'VT323', monospace;
      background-color: #1d1d1d;
      /* Using a reliable tiling dirt texture */
      background-image: url('https://assets.mcasset.cloud/1.20.1/assets/minecraft/textures/block/dirt.png');
      background-size: 64px;
      background-repeat: repeat;
      background-attachment: fixed;
      image-rendering: pixelated;
      cursor: default;
      min-height: 100vh;
      margin: 0;
    }

    /* Dark Overlay for readability */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.75);
      /* Darker overlay for dirt background */
      z-index: -1;
      pointer-events: none;
    }

    ::-webkit-scrollbar {
      width: 12px;
      background: #1d1d1d;
    }

    ::-webkit-scrollbar-thumb {
      background: #c6c6c6;
      border: 2px solid #1d1d1d;
    }

    .text-shadow-mc {
      text-shadow: 2px 2px 0px #3f3f3f;
    }

    .text-shadow-none {
      text-shadow: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
